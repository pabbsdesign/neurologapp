<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroLog — Symptom Detective</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d1a; --surface: #13132a; --surface2: #1a1a35; --border: #2a2a4a;
      --text: #e2e2f0; --muted: #9090bb;
      --primary: #7c3aed; --primary-light: #a78bfa;
      --migraine: #f43f5e; --migraine-dim: #3b1a22;
      --iih: #f59e0b; --iih-dim: #3a2a0a;
      --chiari: #38bdf8; --chiari-dim: #0a2535;
      --xp: #10b981; --med: #34d399;
      --warn: #f97316; --danger: #ef4444;
      --cat-pain: #f43f5e; --cat-visual: #38bdf8; --cat-sensory: #f59e0b; --cat-systemic: #a78bfa;
    }
    html { font-size: 17px; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.5; min-height: 100dvh; display: flex; flex-direction: column; }
    #root { flex: 1; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .flex { display: flex; } .flex-col { flex-direction: column; }
    .items-center { align-items: center; } .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
    .w-full { width: 100%; } .flex-1 { flex: 1; }
    .text-xs { font-size: .75rem; } .text-sm { font-size: .85rem; } .text-lg { font-size: 1.1rem; }
    .text-xl { font-size: 1.3rem; } .text-2xl { font-size: 1.6rem; }
    .font-bold { font-weight: 700; } .font-semibold { font-weight: 600; }
    .text-muted { color: var(--muted); } .text-primary { color: var(--primary-light); }
    .text-xp { color: var(--xp); } .text-med { color: var(--med); }
    .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
    .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--primary-light); color: var(--primary-light); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-lg { padding: 14px 28px; font-size: 1rem; border-radius: 10px; }
    .btn-sm { padding: 6px 14px; font-size: .8rem; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .nav { display: flex; justify-content: space-around; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); position: sticky; bottom: 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 10px; border-radius: 8px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: .72rem; font-weight: 600; transition: color .15s; }
    .nav-item.active { color: var(--primary-light); }
    .nav-item svg { width: 20px; height: 20px; }

    .xp-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; transition: width .6s cubic-bezier(.4,0,.2,1); }

    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: .75rem; font-weight: 700; }
    .pill-migraine { background: var(--migraine-dim); color: var(--migraine); }
    .pill-iih      { background: var(--iih-dim);      color: var(--iih); }
    .pill-chiari   { background: var(--chiari-dim);   color: var(--chiari); }

    .attr-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }

    .symptom-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .symptom-btn { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: .82rem; cursor: pointer; text-align: left; transition: all .15s; line-height: 1.3; }
    .symptom-btn:hover { border-color: var(--primary-light); }
    .symptom-btn.selected { border-color: var(--primary); background: #1e1040; color: var(--primary-light); }
    .symptom-btn .icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

    .context-q { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .context-q p { font-size: .9rem; margin-bottom: 10px; line-height: 1.4; }
    .yesno { display: flex; gap: 8px; }
    .yesno-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .yesno-btn.yes.selected { background: #0a2a1a; border-color: var(--xp); color: var(--xp); }
    .yesno-btn.no.selected  { background: #2a0a0a; border-color: #f43f5e; color: #f43f5e; }

    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: var(--border); border-radius: 3px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--primary-light); border-radius: 50%; cursor: pointer; }

    .badge { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 8px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
    .badge.unlocked { border-color: var(--primary); background: #16103a; }
    .badge.locked { opacity: .35; }
    .badge .badge-icon { font-size: 1.8rem; }
    .badge .badge-name { font-size: .75rem; font-weight: 700; color: var(--primary-light); }
    .badge.locked .badge-name { color: var(--muted); }

    @keyframes bounce     { 0%,100% { transform: translateY(0); }   50% { transform: translateY(-8px); } }
    @keyframes sway       { 0%,100% { transform: rotate(-2deg); }   50% { transform: rotate(2deg); } }
    @keyframes slowpulse  { 0%,100% { transform: scale(1); }        50% { transform: scale(.97); } }
    @keyframes fadeIn     { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    @keyframes glow       { 0%,100% { opacity:.6; }  50% { opacity:1; } }
    @keyframes xpPop      { 0% { opacity:0; transform:translateY(0) scale(.5); } 50% { opacity:1; transform:translateY(-20px) scale(1.1); } 100% { opacity:0; transform:translateY(-40px) scale(1); } }
    @keyframes overheat   { 0%,100% { transform: scale(1) rotate(-1deg); } 50% { transform: scale(1.04) rotate(1deg); } }
    @keyframes tempFill   { from { height: 0%; } }
    @keyframes alertPulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
    @keyframes medCheck   { 0% { transform:scale(1); } 50% { transform:scale(1.15); } 100% { transform:scale(1); } }
    @keyframes pulseGlow  { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
    @keyframes idleFloat  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes boing      { 0%{transform:scale(1)} 35%{transform:scale(1.13,.87)} 65%{transform:scale(.94,1.08)} 100%{transform:scale(1)} }
    @keyframes floatUp    { 0%{opacity:.85;transform:translateY(0)} 100%{opacity:0;transform:translateY(-30px)} }
    @keyframes neuralFloat { 0%,100%{opacity:.65;transform:translateX(0) scale(1)} 50%{opacity:1;transform:translateX(6px) scale(1.25)} }
    @keyframes sparkFade  { 0%{opacity:1;transform:translate(-50%,-50%) scale(.5)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.6)} }
    @keyframes legPanic   { 0%{transform:rotate(-20deg) translateY(0)} 100%{transform:rotate(20deg) translateY(-3px)} }
    @keyframes jitter     { 0%,100%{transform:rotate(-2.5deg)} 50%{transform:rotate(2.5deg)} }
    @keyframes synapseHappyBounce { 0%,100%{transform:scale(1)} 40%{transform:scale(1.15) translateY(-6px)} }
    @keyframes synapseCelebration { 0%{transform:scale(1) rotate(0deg)} 30%{transform:scale(1.15) translateY(-8px) rotate(180deg)} 70%{transform:scale(1.1) rotate(300deg)} 100%{transform:scale(1) rotate(360deg)} }
    @keyframes synapseNod  { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(12deg)} 70%{transform:rotate(-5deg)} }
    @keyframes synapseJump { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-12px) scale(1.1,.9)} 70%{transform:translateY(-4px) scale(.95,1.05)} }
    @keyframes tempoWobble { 0%,100%{transform:rotate(0deg)} 20%{transform:rotate(-8deg) scale(1.05)} 40%{transform:rotate(8deg) scale(1.05)} 60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)} }
    @keyframes badgeBounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }
    @keyframes confettiOut { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1);opacity:0} }
    @keyframes celebIn     { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
    @keyframes mercuryFlash { 0%,100%{opacity:0} 40%,60%{opacity:1} }

    .fade-in { animation: fadeIn .3s ease; }
    .xp-pop { animation: xpPop 1.5s ease forwards; position: fixed; pointer-events: none; z-index: 999; color: var(--xp); font-weight: 800; font-size: 1.2rem; }

    .scroll-area { overflow-y: auto; flex: 1; padding: 16px 16px calc(80px + env(safe-area-inset-bottom)) 16px; }
    .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; transition: border-color .15s; }
    .history-item:hover { border-color: var(--primary); }
    .section-header { font-size: .75rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .week-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-migraine { background: var(--migraine); }
    .dot-iih { background: var(--iih); }
    .dot-chiari { background: var(--chiari); }
    .steps { display: flex; gap: 4px; justify-content: center; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .2s; }
    .step-dot.active { background: var(--primary-light); }
    .step-dot.done   { background: var(--xp); }
    .top-bar { padding: 14px 16px 0; display: flex; justify-content: space-between; align-items: center; }
    .app-title { font-size: 1rem; font-weight: 800; color: var(--primary-light); letter-spacing: -.02em; }
    .toast { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--primary); color: var(--primary-light); padding: 10px 18px; border-radius: 999px; font-size: .85rem; font-weight: 600; z-index: 200; animation: fadeIn .3s ease; white-space: nowrap; }

    .med-card { background: var(--surface2); border: 2px solid var(--border); border-radius: 14px; padding: 16px; transition: all .2s; cursor: pointer; }
    .med-card.taken { border-color: var(--med); background: #0a2018; }
    .med-card:active { transform: scale(.98); }
    .med-check { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all .2s; }
    .med-check.taken { border-color: var(--med); background: var(--med); animation: medCheck .3s ease; }

    /* Alert banner */
    .alert-banner { padding: 12px 16px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-size: .85rem; font-weight: 600; }
    .alert-warning { background: #2a1a00; border: 1px solid var(--warn); color: var(--warn); }
    .alert-danger  { background: #2a0808; border: 1px solid var(--danger); color: var(--danger); animation: alertPulse 1.5s ease-in-out infinite; }

    textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-size: .85rem; resize: vertical; min-height: 70px; font-family: inherit; }
    textarea:focus { outline: none; border-color: var(--primary); }

    /* Adherence ring */
    .adh-ring { position: relative; width: 56px; height: 56px; }
    .adh-ring svg { transform: rotate(-90deg); }
    .adh-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 800; }

    /* Tempo — thermometer character */
    .tempo-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; position: relative; }
    .tempo-head { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; position: relative; z-index: 2; transition: all .3s; }
    .tempo-arms { display: flex; align-items: center; position: relative; margin-top: -2px; }
    .tempo-arm  { width: 18px; height: 10px; border-radius: 5px; transition: background .3s; }
    .tempo-arm-l { margin-right: -3px; z-index: 1; border-radius: 5px 0 0 5px; }
    .tempo-arm-r { margin-left:  -3px; z-index: 1; border-radius: 0 5px 5px 0; }
    .tempo-tube { width: 34px; height: 110px; border-radius: 17px; position: relative; overflow: hidden; z-index: 2; border-width: 3px; border-style: solid; transition: border-color .3s; }
    .tempo-mercury { position: absolute; bottom: 0; left: 0; right: 0; transition: height .7s cubic-bezier(.4,0,.2,1), background .3s; }
    .tempo-tick { position: absolute; right: 3px; width: 7px; height: 1.5px; border-radius: 1px; }
    .tempo-count { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: .65rem; font-weight: 900; z-index: 3; transition: color .3s; }
    .tempo-bulb { width: 50px; height: 50px; border-radius: 50%; border-width: 3px; border-style: solid; transition: all .3s; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; margin-top: -4px; z-index: 2; position: relative; }
    .tempo-label { font-weight: 800; font-size: .85rem; margin-top: 6px; transition: color .3s; }
    .tempo-state { font-size: .75rem; font-weight: 700; transition: color .3s; }

    .log-abortive-btn { width: 100%; padding: 14px; border-radius: 12px; border: 2px dashed; background: transparent; cursor: pointer; font-size: .9rem; font-weight: 700; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .log-abortive-btn:hover { opacity: .8; }

    /* Abortive history dots */
    .use-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; }

    /* ── Skip link ── */
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; border-radius: 0 0 8px 0; text-decoration: none; font-weight: 700; z-index: 1000; transition: top .15s; }
    .skip-link:focus { top: 0; }

    /* ── Modal sheet ── */
    .modal-sheet { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); width: 100%; max-height: min(85dvh, calc(100dvh - env(safe-area-inset-top) - 20px)); overflow-y: auto; border: 1px solid var(--border); }

    /* ── Stat cells ── */
    .stat-cell { background: var(--surface2); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .stat-cell-value { font-size: 1.4rem; font-weight: 800; line-height: 1.1; }
    .stat-cell-label { font-size: .72rem; color: var(--muted); font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

    /* ── Grid helpers ── */
    .stats-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stats-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }

    /* ── Chip / pill buttons ── */
    .filter-pill { padding: 6px 14px; border-radius: 999px; font-size: .8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); white-space: nowrap; transition: all .15s; }
    .filter-pill.active { background: var(--primary); border-color: var(--primary); color: white; }
    .option-chip { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .option-chip.selected { border-color: var(--primary); background: var(--primary); color: white; }
    .choice-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .76rem; font-weight: 700; cursor: pointer; text-align: center; line-height: 1.3; transition: all .15s; }

    /* ── Character card ── */
    .char-card { background: linear-gradient(135deg,#0e0e22,#16103a); border-color: var(--primary); }

    /* ── Collapsible section toggle ── */
    .section-toggle { display: flex; justify-content: space-between; align-items: center; width: 100%; background: none; border: none; cursor: pointer; padding: 4px 0 8px; color: inherit; }
    .section-toggle-icon { font-size: .75rem; color: var(--muted); }

    /* ── App shell ── */
    .app-root { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .app-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .app-inner { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Responsive: tablet (768px) ── */
    @media (min-width: 768px) {
      .app-root { flex-direction: row; }
      .app-main { order: 2; overflow-y: auto; }
      .nav { order: 1; flex-direction: column; justify-content: flex-start; align-items: stretch; width: 200px; height: 100dvh; border-top: none; border-right: 1px solid var(--border); padding: 16px 8px max(16px, env(safe-area-inset-bottom)) 8px; position: sticky; top: 0; flex-shrink: 0; }
      .nav-item { flex-direction: row; gap: 10px; padding: 10px 14px; border-radius: 10px; font-size: .85rem; justify-content: flex-start; }
      .nav-item svg { width: 18px; height: 18px; }
      .app-inner { flex: none; overflow: visible; }
      .scroll-area { overflow-y: visible; padding-bottom: 32px; max-width: 600px; margin: 0 auto; }
      .symptom-grid { grid-template-columns: repeat(3,1fr); }
    }

    /* ── Responsive: desktop (1024px) ── */
    @media (min-width: 1024px) {
      .nav { width: 220px; }
      .scroll-area { max-width: 720px; }
      .symptom-grid { grid-template-columns: repeat(4,1fr); }
      .stats-grid-3 { grid-template-columns: repeat(6,1fr); }
      .report-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
      .chart-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    }
  </style>
</head>

<script type="text/babel">
/*

 * This tool is NOT a medical device and provides no medical advice.
 */
const { useState, useEffect, useRef } = React;

// ─── Audio Engine ─────────────────────────────────────────────────────────────

function playSound(type) {
  if (localStorage.getItem('neurolog_mute') === '1') return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const play = (freq, start, dur, vol = 0.15) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, ctx.currentTime + start);
      g.gain.setValueAtTime(0, ctx.currentTime + start);
      g.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.015);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start);
      o.stop(ctx.currentTime + start + dur + 0.05);
    };
    if (type==='med')         { play(523.25,0,.08); play(659.25,.09,.08); }
    else if (type==='medComplete') { play(523.25,0,.08); play(659.25,.09,.08); play(783.99,.18,.1,.18); }
    else if (type==='abortive')    { play(220,0,.15,.1); }
    else if (type==='episode')     { play(392,0,.1,.12); play(329.63,.11,.1,.12); }
    else if (type==='goodDay')     { play(659.25,0,.12,.2); }
    else if (type==='xpLevel')     { play(523.25,0,.1); play(659.25,.11,.1); play(783.99,.22,.1); play(1046.5,.33,.15,.22); }
    else if (type==='badge')       { play(523.25,0,.3,.1); play(659.25,0,.3,.1); play(783.99,0,.3,.1); }
    setTimeout(()=>{ try { ctx.close(); } catch {} }, 2000);
  } catch(e) {}
}

// ─── Constants ────────────────────────────────────────────────────────────────

const MEDS = [
  { id: 'topirAM',     label: 'Topiramate AM', dose: '50mg', time: 'Morning', icon: '🌅', xp: 15 },
  { id: 'topirPM',     label: 'Topiramate PM', dose: '50mg', time: 'Evening', icon: '🌙', xp: 15 },

function today()     { return new Date().toISOString().slice(0,10); }
function yesterday() { const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function daysAgo(n)  { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }

function getLevel(xp) {
  let lvl=0;
  for (let i=LEVELS.length-1;i>=0;i--) { if(xp>=LEVELS[i].xp){lvl=i;break;} }
  const current=LEVELS[lvl], next=LEVELS[lvl+1];
  return { lvl:lvl+1, current, next, progress:next?((xp-current.xp)/(next.xp-current.xp))*100:100, xpToNext:next?next.xp-xp:0 };
}

function getCharStage(medXP) {
  let s=CHAR_STAGES[0];
  for (const st of CHAR_STAGES) { if(medXP>=st.minXP) s=st; }
  return s;
}

function getAccessories(level) {
  const acc=[];
  if(level>=2) acc.push({emoji:'🔍',style:{top:-14,right:-8}});
  if(level>=4) acc.push({emoji:'🎩',style:{top:-28,left:'50%',transform:'translateX(-50%)'}});
  if(level>=6) acc.push({emoji:'⭐',style:{top:-14,left:-12}});
  if(level>=8) acc.push({emoji:'🛡️',style:{bottom:2,right:-16}});
  if(level>=10) acc.push({emoji:'👑',style:{top:-32,left:'50%',transform:'translateX(-50%)'}});
  return acc;
}

function attribute(syms, ctx) {
  let s={migraine:0,iih:0,chiari:0};
  SYMPTOMS.forEach(sym => {
    if(syms.includes(sym.id)){s.migraine+=sym.scores.migraine;s.iih+=sym.scores.iih;s.chiari+=sym.scores.chiari;}
  });
  CONTEXT_QUESTIONS.forEach(q => {
    if(ctx[q.id]===true){s.migraine+=q.migraine;s.iih+=q.iih;s.chiari+=q.chiari;}
  });
  const t=s.migraine+s.iih+s.chiari;
  if(t===0) return {migraine:33,iih:33,chiari:34};
  return {migraine:Math.round(s.migraine/t*100),iih:Math.round(s.iih/t*100),chiari:Math.round(s.chiari/t*100)};
}

function dominant(attr) { return Object.entries(attr).sort((a,b)=>b[1]-a[1])[0][0]; }

function getCharState(data) {
  const days7=[...Array(7)].map((_,i)=>daysAgo(i));
  const totalPoss=days7.length*MEDS.length;
  const totalTaken=days7.reduce((sum,d)=>{const ml=data.medLogs?.[d]||{};return sum+MEDS.filter(m=>ml[m.id]).length;},0);
  const adherence=totalTaken/totalPoss;
  const recentEps=data.episodes.filter(e=>days7.includes(e.date));
  const avgSev=recentEps.length>0?recentEps.reduce((s,e)=>s+(e.severity||5),0)/recentEps.length:3;
  const score=adherence*70+(1-avgSev/10)*30;
  if(score>=68) return 'thriving';
  if(score>=42) return 'stable';
  if(score>=18) return 'struggling';
  return 'drained';
}

// 20th-to-20th cycle
function getCurrentCycle() {
  const now=new Date();
  const day=now.getDate();
  let sm, sy, em, ey;
  if(day>=20) {
    sm=now.getMonth(); sy=now.getFullYear();
    em=now.getMonth()+1; ey=now.getFullYear();
    if(em>11){em=0;ey++;}
  } else {
    sm=now.getMonth()-1; sy=now.getFullYear();
    if(sm<0){sm=11;sy--;}
    em=now.getMonth(); ey=now.getFullYear();
  }
  const start=`${sy}-${String(sm+1).padStart(2,'0')}-20`;
  const end=`${ey}-${String(em+1).padStart(2,'0')}-20`;
  return {start,end};
}

function getCycleUses(abortiveLogs, cycle) {
  return (abortiveLogs||[]).filter(e=>e.date>=cycle.start && e.date<cycle.end);
}

function tempoColor(uses) {
  if(uses>=ABORTIVE_MAX) return '#ef4444';
  if(uses>=8) return '#f97316';
  if(uses>=5) return '#f59e0b';
  return '#10b981';
}

function tempoFace(uses) {
  if(uses>=ABORTIVE_MAX) return '🤯';
  if(uses===9) return '😰';
  if(uses>=7) return '😟';
  if(uses>=5) return '😐';
  if(uses>=2) return '🙂';
  return '😊';
}

const KEY='neurolog_v3';
function loadData() {
  try {
    const raw=localStorage.getItem(KEY);
    if(raw) {
      const d=JSON.parse(raw);
      if(!d.medLogs) d.medLogs={};
      if(!d.medXP) d.medXP=0;
      if(!d.medStreak) d.medStreak=0;
      if(!d.lastMedDate) d.lastMedDate=null;
      if(!d.abortiveLogs) d.abortiveLogs=[];
      if(!d.goodDays) d.goodDays=[];
      if(!d.stats) d.stats={};
      ['totalLogs','fullDetailCount','chiariDominant','iihDominant','migraineDominant',
       'totalMedDoses','fullDayMeds','medStreak','cleanCycles'].forEach(k=>{if(!d.stats[k])d.stats[k]=0;});
      if(!('lastCycleStart' in d)) d.lastCycleStart=null;
      if(!d.assessments) d.assessments=[];
      if(!d.scaleIntervals) d.scaleIntervals={};
      return d;
    }
  } catch {}
  return {
    episodes:[], xp:0, streak:0, lastLogDate:null,
    medLogs:{}, medXP:0, medStreak:0, lastMedDate:null,
    abortiveLogs:[], goodDays:[], lastCycleStart:null, assessments:[],

}

<h2>Episode Log</h2>
${eps.length>0?`<table>

  ${episodeRows}

${(()=>{

  if(!pass20s.length&&!fpq3s.length) return '';
  return `<h2>Pain Anxiety &amp; Fear Assessments</h2>
<p style="font-size:11px;color:#555;margin-bottom:10px;">Validated instruments tracking the psychological burden of chronic pain. Elevated scores in a patient with confirmed organic pathology (IIH, Chiari malformation, migraine) indicate <strong>reactive</strong> pain anxiety — consistent with real ongoing pain — not pain generated by primary psychological disturbance.<br>PASS-20: McCracken &amp; Dhingra (2002). FPQ-III: McNeil &amp; Rainwater (1998).</p>
${pass20s.length?`<h3 style="font-size:12px;margin:12px 0 5px;">PASS-20 — Pain Anxiety Symptoms Scale (range 0–100; Low &lt;20 · Moderate 20–40 · High &gt;40)</h3>
<table>
  <tr><th>Date</th><th>Total</th><th>Band</th><th>Fear /25</th><th>Cognitive /25</th><th>Escape/Avoid /25</th><th>Physiological /25</th></tr>
  ${pass20s.map(a=>`<tr><td>${a.date}</td><td><strong>${a.total}</strong></td><td>${a.band}</td><td>${a.subscales?.Fear||0}</td><td>${a.subscales?.Cognitive||0}</td><td>${a.subscales?.['Escape/Avoid']||0}</td><td>${a.subscales?.Physiological||0}</td></tr>`).join('')}
</table>`:''}
${fpq3s.length?`<h3 style="font-size:12px;margin:12px 0 5px;">FPQ-III — Fear of Pain Questionnaire (range 30–150; Low ≤60 · Moderate 61–110 · High ≥111)</h3>
<table>
  <tr><th>Date</th><th>Total</th><th>Band</th><th>Severe /50</th><th>Minor /50</th><th>Medical /50</th></tr>
  ${fpq3s.map(a=>`<tr><td>${a.date}</td><td><strong>${a.total}</strong></td><td>${a.band}</td><td>${a.subscales?.Severe||0}</td><td>${a.subscales?.Minor||0}</td><td>${a.subscales?.Medical||0}</td></tr>`).join('')}
</table>`:''}`;

</body>

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`neurolog-clinic-${today()}.html`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);

// ─── Report helpers ────────────────────────────────────────────────────────────

function getEpisodesInRange(episodes, range) {
  if(range==='30d') { const c=daysAgo(30); return episodes.filter(e=>e.date>=c); }
  if(range==='90d') { const c=daysAgo(90); return episodes.filter(e=>e.date>=c); }
  return episodes;
}

function buildDoctorReport(data, range) {
  const eps=getEpisodesInRange(data.episodes,range);
  if(eps.length===0) return 'No episodes in this period.';
  const rangeLabel=range==='30d'?'Last 30 days':range==='90d'?'Last 90 days':'All time';
  const daysInRange=range==='30d'?30:range==='90d'?90:Math.max(1,Math.round((new Date()-new Date(data.episodes[0].date))/86400000)+1);
  const weeks=Math.max(1,daysInRange/7);
  const avgPerWeek=(eps.length/weeks).toFixed(1);
  const avgSev=(eps.reduce((s,e)=>s+(e.severity||5),0)/eps.length).toFixed(1);
  const maxSev=Math.max(...eps.map(e=>e.severity||0));
  const badDays=eps.filter(e=>(e.severity||0)>=7||e.impact==='bedbound').length;

  const symCounts={};
  eps.forEach(e=>e.symptoms.forEach(s=>{symCounts[s]=(symCounts[s]||0)+1;}));
  const topSyms=Object.entries(symCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const domCount={migraine:0,iih:0,chiari:0};
  eps.forEach(e=>{domCount[dominant(e.attr)]++;});

  const impactEps=eps.filter(e=>e.impact);
  const respEps=eps.filter(e=>e.abortiveResponse&&e.abortiveResponse!=='unused');

  const medEntries=Object.entries(data.medLogs||{}).filter(([d])=>{
    if(range==='all') return true;
    return d>=daysAgo(daysInRange);
  });
  const fullDays=medEntries.filter(([,ml])=>MEDS.every(m=>ml[m.id])).length;
  const preventiveAdh=medEntries.length>0?Math.round(fullDays/medEntries.length*100):0;
  const cycle=getCurrentCycle();
  const abortiveUses=getCycleUses(data.abortiveLogs,cycle).length;

  const notedEps=[...eps].reverse().filter(e=>e.notes).slice(0,3);

  let r=`NEUROLOGY REPORT — Generated ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}
Period: ${rangeLabel}

EPISODE FREQUENCY
• ${eps.length} episodes / avg ${avgPerWeek}/week / avg severity ${avgSev}/10 / highest ${maxSev}/10
• Bad days (sev ≥7 or bedbound): ${badDays}

TOP SYMPTOMS
${topSyms.map(([id,n],i)=>`${i+1}. ${SYMPTOMS.find(s=>s.id===id)?.label||id} — ${n} episodes (${Math.round(n/eps.length*100)}%)`).join('\n')}

CONDITION ATTRIBUTION
• Migraine dominant: ${Math.round(domCount.migraine/eps.length*100)}% | IIH: ${Math.round(domCount.iih/eps.length*100)}% | Chiari: ${Math.round(domCount.chiari/eps.length*100)}%`;

  if(impactEps.length>0) {
    const managed=impactEps.filter(e=>e.impact==='managed').length;
    const limited=impactEps.filter(e=>e.impact==='limited').length;
    const bedbound=impactEps.filter(e=>e.impact==='bedbound').length;
    r+=`\n\nFUNCTIONAL IMPACT (${impactEps.length} of ${eps.length} episodes)\n• Managed normally: ${Math.round(managed/impactEps.length*100)}% | Limited activity: ${Math.round(limited/impactEps.length*100)}% | Couldn't function: ${Math.round(bedbound/impactEps.length*100)}%`;
  }
  if(respEps.length>0) {
    const helped=respEps.filter(e=>e.abortiveResponse==='helped').length;
    const partial=respEps.filter(e=>e.abortiveResponse==='partial').length;
    const none=respEps.filter(e=>e.abortiveResponse==='none').length;
    r+=`\n\nTREATMENT RESPONSE — abortive (${respEps.length} episodes)\n• Helped: ${Math.round(helped/respEps.length*100)}% | Partially: ${Math.round(partial/respEps.length*100)}% | No effect: ${Math.round(none/respEps.length*100)}%`;
  }
  r+=`\n\nMEDICATION ADHERENCE\n• Preventive full-compliance days: ${preventiveAdh}% | Abortive uses this cycle: ${abortiveUses}/${ABORTIVE_MAX}`;
  if(notedEps.length>0) {
    r+='\n\nNOTES FROM RECENT EPISODES';
    notedEps.forEach(e=>{r+=`\n[${e.date}] ${e.notes}`;});
  }
  r+='\n\n⚠️ Pattern tool only — not a clinical diagnosis. For clinical use only.';
  return r;
}

// ─── Tempo — Thermometer Character ───────────────────────────────────────────

function Tempo({ uses, triggerAnim }) {
  const max=ABORTIVE_MAX;
  const pct=Math.min(uses/max,1);
  const color=tempoColor(uses);
  const isMax=uses>=max;
  const isHot=uses>=8;
  const cycle=getCurrentCycle();
  const daysLeft=Math.max(0,Math.round((new Date(cycle.end)-new Date())/86400000));
  const [blink,setBlink]=useState(false);
  const [excited,setExcited]=useState(false);
  const [wobbling,setWobbling]=useState(false);
  const [badgePulse,setBadgePulse]=useState(false);
  const [coolingDown,setCoolingDown]=useState(false);
  const prevUsesRef=useRef(uses);
  const blinkRef=useRef(null);

  useEffect(()=>{
    if(uses>prevUsesRef.current){ setBadgePulse(true); setTimeout(()=>setBadgePulse(false),350); }
    prevUsesRef.current=uses;
  },[uses]);

  useEffect(()=>{
    if(triggerAnim==='abortive'){ setWobbling(true); setTimeout(()=>setWobbling(false),350); }
    else if(triggerAnim==='cycleReset'){ setCoolingDown(true); setTimeout(()=>setCoolingDown(false),900); }
  },[triggerAnim]);

  useEffect(()=>{
    const go=()=>{ blinkRef.current=setTimeout(()=>{ setBlink(true); setTimeout(()=>{ setBlink(false); go(); },130); },1800+Math.random()*3000); };
    go();
    return ()=>clearTimeout(blinkRef.current);
  },[]);

  const handleTap=()=>{ setExcited(true); setTimeout(()=>setExcited(false),500); };
  const stateLabel=isMax?'🚨 LIMIT':uses===9?'1 left!':uses>=7?'Getting hot…':uses>=5?'Stay mindful':'On track 👍';
  const lArm=wobbling?-90:isMax?-85:excited?-75:isHot?-45:-20;
  const rArm=wobbling? 90:isMax? 85:excited? 75:isHot? 45: 20;
  const bubbleMsg=isMax?'No more! 🆘':isHot?'So HOT! 😤':uses>0?`${uses} used!`:'Tap me! 👋';

  return (
    <div style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',cursor:'pointer',userSelect:'none',minWidth:72}}
      onClick={handleTap}>

      {/* Speech bubble */}
      {excited&&<div style={{
        position:'absolute',top:-22,left:'50%',transform:'translateX(-50%)',
        background:'var(--surface2)',border:`1px solid ${color}`,borderRadius:8,
        padding:'3px 9px',fontSize:'.66rem',fontWeight:800,color,
        whiteSpace:'nowrap',animation:'fadeIn .1s ease',zIndex:10,
      }}>{bubbleMsg}</div>}

      {/* Heat particles */}
      {isHot&&[...Array(isMax?4:2)].map((_,i)=>(
        <div key={i} style={{
          position:'absolute',bottom:'88%',left:`${26+i*15}%`,
          fontSize:isMax?'.8rem':'.6rem',
          animation:`floatUp ${1+i*0.35}s ease-out infinite`,
          animationDelay:`${i*0.42}s`,pointerEvents:'none',zIndex:5,
        }}>{isMax?'🔥':'💨'}</div>
      ))}

      {/* Glow halo */}
      <div style={{
        position:'absolute',top:6,left:'50%',transform:'translateX(-50%)',
        width:74,height:74,borderRadius:'50%',
        background:`radial-gradient(circle, ${color}40, transparent 68%)`,
        animation:'pulseGlow 2s ease-in-out infinite',pointerEvents:'none',
      }}/>

      {/* Body */}
      <div style={{position:'relative',width:64,height:72}}>
        <div style={{
          position:'absolute',inset:0,
          borderRadius:'44% 44% 50% 50% / 38% 38% 58% 58%',
          background:`radial-gradient(circle at 38% 28%, ${color}ff, ${color}99)`,
          border:`3px solid ${color}cc`,
          boxShadow:`0 4px 16px ${color}55, inset 0 -4px 10px rgba(0,0,0,0.28)`,
          overflow:'hidden',
          animation:wobbling?'tempoWobble .35s ease':isMax?'jitter .22s ease-in-out infinite':excited?'boing .35s ease':isHot?'sway 2s ease-in-out infinite':'idleFloat 3.5s ease-in-out infinite',
        }}>
          {/* Fill level (darker overlay rising from bottom) */}
          <div style={{
            position:'absolute',bottom:0,left:0,right:0,
            height:`${pct*100}%`,
            background:'linear-gradient(to top, rgba(0,0,0,0.32), rgba(0,0,0,0.06))',
            transition:'height .8s cubic-bezier(.4,0,.2,1)',
          }}/>
          {/* Cool-down mercury splash */}
          {coolingDown&&<div style={{position:'absolute',bottom:0,left:'10%',right:'10%',height:'22%',background:'rgba(255,255,255,0.82)',borderRadius:'0 0 44px 44px',animation:'mercuryFlash .75s ease forwards',pointerEvents:'none'}}/>}

          {/* Level tick lines */}
          {[1,2,3,4].map(i=>(
            <div key={i} style={{
              position:'absolute',bottom:`${i*20}%`,left:'18%',right:'18%',
              height:1,background:'rgba(255,255,255,0.22)',
              opacity:pct*100>i*20?0.8:0.15,transition:'opacity .5s',
            }}/>
          ))}
          {/* Eyes */}
          <div style={{position:'absolute',top:'25%',left:'16%',right:'16%',display:'flex',justifyContent:'space-around'}}>
            {[0,1].map(s=>(
              <div key={s} style={{
                width:14,height:blink?2:14,borderRadius:'50%',
                background:'rgba(255,255,255,0.95)',transition:'height .07s',
                display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0,
              }}>
                {!blink&&<div style={{
                  width:7,height:7,borderRadius:'50%',background:'rgba(10,5,25,0.85)',
                  boxShadow:'inset 1px 1px 0 rgba(255,255,255,0.55)',
                  marginTop:isMax?5:isHot?3:0,transition:'margin-top .2s',
                }}/>}
              </div>
            ))}
          </div>
          {/* Mouth */}
          <div style={{
            position:'absolute',bottom:'22%',left:'50%',transform:'translateX(-50%)',
            width:isMax?22:18,height:isMax?9:isHot?7:6,
            borderRadius:isMax?'12px 12px 0 0':'0 0 12px 12px',
            background:'rgba(0,0,0,0.3)',transition:'all .3s',
          }}/>
          {/* Rosy cheeks when cool */}
          {!isHot&&<>
            <div style={{position:'absolute',top:'44%',left:'7%',width:11,height:6,borderRadius:'50%',background:'rgba(255,200,200,0.45)'}}/>
            <div style={{position:'absolute',top:'44%',right:'7%',width:11,height:6,borderRadius:'50%',background:'rgba(255,200,200,0.45)'}}/>
          </>}
          {/* Sweat drop when warm */}
          {isHot&&!isMax&&<div style={{position:'absolute',top:'17%',right:'11%',fontSize:'.5rem'}}>💧</div>}
        </div>

        {/* Arms */}
        <div style={{
          position:'absolute',top:'36%',left:-15,width:18,height:10,borderRadius:'5px 0 0 5px',
          background:color,transformOrigin:'right center',transform:`rotate(${lArm}deg)`,
          transition:'transform .35s cubic-bezier(.34,1.56,.64,1)',boxShadow:`0 2px 5px ${color}66`,
        }}/>
        <div style={{
          position:'absolute',top:'36%',right:-15,width:18,height:10,borderRadius:'0 5px 5px 0',
          background:color,transformOrigin:'left center',transform:`rotate(${rArm}deg)`,
          transition:'transform .35s cubic-bezier(.34,1.56,.64,1)',boxShadow:`0 2px 5px ${color}66`,
        }}/>

        {/* Use-count badge */}
        <div style={{
          position:'absolute',top:-10,right:-10,width:26,height:26,borderRadius:'50%',
          background:isMax?'var(--danger)':color,border:'2px solid var(--bg)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'.58rem',fontWeight:900,color:'rgba(0,0,0,0.85)',
          boxShadow:`0 0 10px ${color}88`,
          animation:badgePulse?'badgeBounce .35s ease':isMax?'pulseGlow .75s ease-in-out infinite':'none',
        }}>{uses}/{max}</div>
      </div>

      {/* Legs */}
      <div style={{display:'flex',gap:8,marginTop:-2,position:'relative',zIndex:1}}>
        {[0,1].map(i=>(
          <div key={i} style={{
            width:16,height:20,borderRadius:'0 0 8px 8px',background:color,
            boxShadow:`0 3px 6px ${color}55`,
            animation:isMax?`legPanic .28s ease-in-out infinite ${i===1?'alternate-reverse':'alternate'}`:'none',
          }}/>
        ))}
      </div>

      {/* Label */}
      <div style={{marginTop:5,textAlign:'center'}}>
        <div style={{fontWeight:800,fontSize:'.82rem',color,letterSpacing:'-.01em'}}>Tempo</div>
        <div style={{fontSize:'.66rem',fontWeight:700,color,marginTop:1}}>{stateLabel}</div>
        <div style={{fontSize:'.6rem',color:'var(--muted)',marginTop:1}}>{daysLeft}d left</div>
      </div>
    </div>
  );
}

// ─── Synapse — Guardian Character ────────────────────────────────────────────

function Synapse({ state, level, medXP, triggerAnim }) {
  const stage=getCharStage(medXP);
  const accessories=getAccessories(level);
  const [blink,setBlink]=useState(false);
  const [tapped,setTapped]=useState(false);
  const [tempCheeks,setTempCheeks]=useState(false);
  const blinkRef=useRef(null);

  useEffect(()=>{
    if(triggerAnim==='goodDay'){ setTempCheeks(true); setTimeout(()=>setTempCheeks(false),700); }
  },[triggerAnim]);

  useEffect(()=>{
    const go=()=>{ blinkRef.current=setTimeout(()=>{ setBlink(true); setTimeout(()=>{ setBlink(false); go(); },130); },1600+Math.random()*3500); };
    go();
    return ()=>clearTimeout(blinkRef.current);
  },[]);

  const handleTap=()=>{ setTapped(true); setTimeout(()=>setTapped(false),620); };

  const STATES={
    thriving: {body:'#7c3aed',shine:'#c4b5fd',glow:'rgba(167,139,250,0.42)',anim:'bounce 1.8s ease-in-out infinite',eyeH:18,pupilTop:'46%',cheeks:true,mouthW:26,mouthH:9,smile:true,sparks:4},
    stable:   {body:'#5b21b6',shine:'#a78bfa',glow:'rgba(124,58,237,0.28)',anim:'sway 3s ease-in-out infinite',  eyeH:15,pupilTop:'50%',cheeks:false,mouthW:20,mouthH:6,smile:true,sparks:1},
    struggling:{body:'#4c1d95',shine:'#6d28d9',glow:'rgba(76,29,149,0.2)', anim:'slowpulse 4s ease-in-out infinite',eyeH:9, pupilTop:'55%',cheeks:false,mouthW:16,mouthH:5,smile:false,sparks:0},
    drained:  {body:'#2d2060',shine:'#3b2a7a',glow:'rgba(30,20,60,0.15)', anim:'slowpulse 5s ease-in-out infinite',eyeH:3, pupilTop:'60%',cheeks:false,mouthW:12,mouthH:4,smile:false,sparks:0},
  };
  const cfg=STATES[state]||STATES.stable;
  const stateLabel={thriving:'Thriving ✨',stable:'Stable',struggling:'Needs Support',drained:'Drained'}[state];
  const stateColor={thriving:'var(--xp)',stable:'var(--primary-light)',struggling:'var(--iih)',drained:'var(--migraine)'}[state];
  const tapMsg={thriving:'✨ Feeling great!',stable:'👋 Hanging in!',struggling:'😔 Rough patch…',drained:'😴 Need rest…'}[state];

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,cursor:'pointer',userSelect:'none',position:'relative'}}
      onClick={handleTap}>

      {/* Speech bubble on tap */}
      {tapped&&<div style={{
        position:'absolute',top:-26,left:'50%',transform:'translateX(-50%)',
        background:'var(--surface2)',border:`1px solid ${stateColor}`,borderRadius:8,
        padding:'3px 10px',fontSize:'.7rem',fontWeight:800,color:stateColor,
        whiteSpace:'nowrap',animation:'fadeIn .1s ease',zIndex:10,
      }}>{tapMsg}</div>}

      <div style={{position:'relative',width:110,height:116}}>
        {/* Glow ring */}
        <div style={{position:'absolute',inset:-14,borderRadius:'50%',background:`radial-gradient(circle, ${cfg.glow}, transparent)`,animation:'pulseGlow 2.5s ease-in-out infinite',pointerEvents:'none'}}/>

        {/* Floating neural sparks */}
        {[...Array(cfg.sparks)].map((_,i)=>(
          <div key={i} style={{
            position:'absolute',fontSize:'.65rem',
            top:`${16+i*22}%`,left:i%2===0?'-16%':'108%',
            animation:`neuralFloat ${2.2+i*0.45}s ease-in-out infinite`,
            animationDelay:`${i*0.6}s`,pointerEvents:'none',
          }}>⚡</div>
        ))}

        {/* Tap sparkle burst */}
        {tapped&&[...Array(6)].map((_,i)=>{
          const a=i*60*(Math.PI/180);
          const d=44;
          return (
            <div key={i} style={{
              position:'absolute',
              top:`calc(46% + ${Math.sin(a)*d}px)`,
              left:`calc(50% + ${Math.cos(a)*d}px)`,
              fontSize:'.75rem',
              animation:'sparkFade .55s ease forwards',
              pointerEvents:'none',
            }}>✨</div>
          );
        })}

        {/* Body */}
        <div style={{
          position:'absolute',top:8,left:8,width:95,height:95,
          borderRadius:'55% 45% 50% 50% / 55% 55% 45% 45%',
          background:`radial-gradient(circle at 35% 28%, ${cfg.shine}, ${cfg.body})`,
          boxShadow:`0 4px 24px ${cfg.glow}, inset 0 -6px 14px rgba(0,0,0,0.22)`,
          animation:triggerAnim==='med'?'synapseHappyBounce .3s ease':triggerAnim==='medComplete'?'synapseCelebration .5s ease':triggerAnim==='episode'?'synapseNod .4s ease':triggerAnim==='goodDay'?'synapseJump .3s ease':tapped?'boing .35s ease':cfg.anim,
          transition:'background .5s',
        }}>
          {/* Left eye */}
          <div style={{
            position:'absolute',top:'26%',left:'18%',
            width:20,height:blink?2:cfg.eyeH,
            borderRadius:'50%',background:'white',
            transition:'height .07s',
            display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
          }}>
            {!blink&&cfg.eyeH>5&&<div style={{
              width:10,height:10,borderRadius:'50%',background:'#1a0d30',
              position:'absolute',top:cfg.pupilTop,transform:'translateY(-50%)',
              boxShadow:'1px 1px 0 rgba(255,255,255,0.55)',transition:'top .3s',
            }}/>}
          </div>
          {/* Right eye */}
          <div style={{
            position:'absolute',top:'26%',right:'18%',
            width:20,height:blink?2:cfg.eyeH,
            borderRadius:'50%',background:'white',
            transition:'height .07s',
            display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
          }}>
            {!blink&&cfg.eyeH>5&&<div style={{
              width:10,height:10,borderRadius:'50%',background:'#1a0d30',
              position:'absolute',top:cfg.pupilTop,transform:'translateY(-50%)',
              boxShadow:'1px 1px 0 rgba(255,255,255,0.55)',transition:'top .3s',
            }}/>}
          </div>
          {/* Cheeks */}
          {(cfg.cheeks||tempCheeks)&&<>
            <div style={{position:'absolute',top:'50%',left:'9%',width:18,height:10,borderRadius:'50%',background:'rgba(255,180,200,0.4)'}}/>
            <div style={{position:'absolute',top:'50%',right:'9%',width:18,height:10,borderRadius:'50%',background:'rgba(255,180,200,0.4)'}}/>
          </>}
          {/* Mouth */}
          <div style={{
            position:'absolute',bottom:'20%',left:'50%',transform:'translateX(-50%)',
            width:cfg.mouthW,height:cfg.mouthH,
            borderRadius:cfg.smile?'0 0 13px 13px':'13px 13px 0 0',
            background:cfg.smile?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.14)',
            transition:'all .4s',
          }}/>
        </div>

        {accessories.map((acc,i)=>(
          <div key={i} style={{position:'absolute',fontSize:'1.2rem',lineHeight:1,...acc.style}}>{acc.emoji}</div>
        ))}
      </div>

      <div style={{textAlign:'center'}}>
        <div style={{fontWeight:800,fontSize:'1rem'}}>Synapse</div>
        <div style={{fontSize:'.75rem',color:'var(--muted)'}}>🧠 {stage.name}</div>
      </div>
      <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'var(--surface2)',border:`1px solid ${stateColor}`,borderRadius:999,padding:'4px 12px'}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:stateColor,animation:'pulseGlow 1.5s ease-in-out infinite'}}/>
        <span style={{fontSize:'.78rem',fontWeight:700,color:stateColor}}>{stateLabel}</span>
      </div>
    </div>
  );
}

// ─── Attribution bars ─────────────────────────────────────────────────────────

function AttributionBars({attr,animate=true}) {
  const [shown,setShown]=useState(!animate);
  useEffect(()=>{if(animate){setTimeout(()=>setShown(true),100);}},[animate]);
  const vals=shown?attr:{migraine:0,iih:0,chiari:0};
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {[['migraine','Migraine','var(--migraine)'],['iih','IIH (Intracranial Pressure)','var(--iih)'],['chiari','Chiari','var(--chiari)']].map(([k,label,color])=>(
        <div key={k}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:'.8rem',color}}>{label}</span>
            <span style={{fontSize:'.8rem',fontWeight:700,color}}>{attr[k]}%</span>
          </div>
          <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${vals[k]}%`,background:color,borderRadius:4,transition:'width .8s cubic-bezier(.4,0,.2,1)'}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Adherence Ring ───────────────────────────────────────────────────────────

function AdherenceRing({pct,color}) {
  const r=22,circ=2*Math.PI*r,filled=circ*(pct/100);
  return (
    <div style={{position:'relative',width:56,height:56}}>
      <svg width={56} height={56} style={{transform:'rotate(-90deg)'}}>
        <circle cx={28} cy={28} r={r} fill="none" stroke="var(--border)" strokeWidth={5}/>
        <circle cx={28} cy={28} r={r} fill="none" stroke={color} strokeWidth={5}
          strokeDasharray={`${filled} ${circ}`} strokeLinecap="round"
          style={{transition:'stroke-dasharray .6s ease'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.7rem',fontWeight:800,color}}>
        {Math.round(pct)}%
      </div>
    </div>
  );
}

// ─── CollapsibleSection ───────────────────────────────────────────────────────

function CollapsibleSection({title,storageKey,defaultOpen=false,children}) {
  const [open,setOpen]=useState(()=>{
    const saved=localStorage.getItem(`neurolog_section_${storageKey}`);
    return saved!==null?saved==='1':defaultOpen;
  });
  const toggle=()=>{
    const next=!open;
    setOpen(next);
    localStorage.setItem(`neurolog_section_${storageKey}`,next?'1':'0');
  };
  return (
    <div className="mb-3">
      <button onClick={toggle} className="section-toggle" aria-expanded={open} aria-controls={`section-${storageKey}`}>
        <span className="section-header" style={{margin:0}}>{title}</span>
        <span className="section-toggle-icon" aria-hidden="true">{open?'▲':'▼'}</span>
      </button>
      {open&&<div id={`section-${storageKey}`} className="fade-in">{children}</div>}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────

  const todayMeds=data.medLogs?.[today()]||{};

      {/* Log CTA — primary action, always at top */}

                  <div className="stat-cell-value" style={{color:mAvgSev!=='—'&&Number(mAvgSev)>=7?'var(--migraine)':mAvgSev!=='—'&&Number(mAvgSev)>=5?'var(--iih)':'var(--xp)'}}>{mAvgSev}</div>

              </div>

                const wss=ws.toISOString().slice(0,10);
                const wes=we.toISOString().slice(0,10);
                const wEps=data.episodes.filter(e=>e.date>=wss&&e.date<wes);
                const wDomColor=(()=>{if(!wEps.length)return null;const c={migraine:0,iih:0,chiari:0};wEps.forEach(e=>{c[dominant(e.attr)]++;});return dominant(c);})();
                const h=wEps.length>0?Math.min(100,wEps.length*18+12):4;
                const showLabel=i%4===0;
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>

                );

            </div>

        </div>
      </CollapsibleSection>

      {recentEps.length>0&&(
        <div>
          <div className="section-header">Recent Episodes</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {recentEps.map((ep,i)=>(
              <div key={i} className="history-item">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:'.75rem',color:'var(--muted)'}}>{ep.date}</span>

                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {ep.symptoms.slice(0,5).map(sid=>{const sym=SYMPTOMS.find(s=>s.id===sid);return sym?<span key={sid} style={{background:'var(--surface2)',padding:'2px 7px',borderRadius:999,fontSize:'.72rem',color:'var(--muted)'}}>{sym.icon} {sym.label}</span>:null;})}
